name: terraform-ci

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - prod

  pull_request:
    paths:
      - "infra/**"
      - "modules/**"
      - "gitops/**"
      - ".github/workflows/terraform.yml"

  push:
    branches:
      - main
    paths:
      - "infra/**"
      - "modules/**"
      - ".github/workflows/terraform.yml"

permissions:
  id-token: write
  contents: read
  security-events: write

jobs:
  tf-dev-plan:
    name: Dev Plan
    runs-on: ubuntu-latest
    # Skip dev plan if this is a prod dispatch
    if: |
      github.event_name != 'workflow_dispatch' ||
      github.event.inputs.environment == 'dev'
    defaults:
      run:
        working-directory: infra/envs/dev
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        # pin: actions/checkout v4.2.2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd
        # pin: hashicorp/setup-terraform v3.1.2
        with:
          terraform_version: 1.12.2

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502
        # pin: aws-actions/configure-aws-credentials v4.0.2
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Format Check
        run: terraform fmt -check

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan (vpc, ecr, eks)
        run: |
          terraform plan \
            -input=false \
            -no-color \
            -var-file="dev.tfvars" \
            -target=module.vpc \
            -target=module.ecr \
            -target=module.eks

  tf-prod-plan:
    name: Prod Plan
    runs-on: ubuntu-latest
    # Skip prod plan if this is a dev dispatch
    if: |
      github.event_name != 'workflow_dispatch' ||
      github.event.inputs.environment == 'prod'
    defaults:
      run:
        working-directory: infra/envs/prod
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        # pin: actions/checkout v4.2.2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd
        # pin: hashicorp/setup-terraform v3.1.2
        with:
          terraform_version: 1.12.2

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502
        # pin: aws-actions/configure-aws-credentials v4.0.2
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Format Check
        run: terraform fmt -check

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan (vpc, ecr, eks)
        run: |
          terraform plan \
            -input=false \
            -no-color \
            -var-file="prod.tfvars" \
            -target=module.vpc \
            -target=module.ecr \
            -target=module.eks

  tf-dev-apply:
    name: Dev Apply
    runs-on: ubuntu-latest
    needs: tf-dev-plan
    if: |
      (github.ref == 'refs/heads/main' && github.event_name == 'push') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'dev')
    defaults:
      run:
        working-directory: infra/envs/dev
    environment: dev
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        # pin: actions/checkout v4.2.2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd
        # pin: hashicorp/setup-terraform v3.1.2
        with:
          terraform_version: 1.12.2

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502
        # pin: aws-actions/configure-aws-credentials v4.0.2
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Apply
        run: |
          terraform apply \
            -auto-approve \
            -input=false \
            -var-file="dev.tfvars" \
            -target=module.vpc \
            -target=module.ecr \
            -target=module.eks

  tf-prod-apply:
    name: Prod Apply
    runs-on: ubuntu-latest
    needs: tf-prod-plan
    if: |
      (github.ref == 'refs/heads/main' && github.event_name == 'push') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'prod')
    defaults:
      run:
        working-directory: infra/envs/prod
    environment: prod
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        # pin: actions/checkout v4.2.2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd
        # pin: hashicorp/setup-terraform v3.1.2
        with:
          terraform_version: 1.12.2

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502
        # pin: aws-actions/configure-aws-credentials v4.0.2
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Apply
        run: |
          terraform apply \
            -auto-approve \
            -input=false \
            -var-file="prod.tfvars" \
            -target=module.vpc \
            -target=module.ecr \
            -target=module.eks

  checkov:
    name: Checkov IaC Scan
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        # pin: actions/checkout v4.2.2

      - name: Install Checkov
        run: pip install checkov==3.2.532 --break-system-packages

      - name: Run Checkov
        run: |
          mkdir -p checkov-output
          checkov \
            -d infra/ \
            -d modules/ \
            -d gitops/ \
            --config-file .checkov.yaml \
            --output sarif \
            --output-file-path checkov-output/ \
            --hard-fail-on HIGH,CRITICAL \
            --quiet || echo "CHECKOV_FAILED=true" >> "$GITHUB_ENV"

      - name: Upload Checkov SARIF to Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@2a00a6e621b3efd9d09658ee2b02c1bb4668b985
        # pin: github/codeql-action v3.36.1
        with:
          sarif_file: checkov-output/results_sarif.sarif
          category: checkov

      - name: Fail if Checkov found HIGH or CRITICAL
        if: env.CHECKOV_FAILED == 'true'
        run: |
          echo "Checkov found HIGH or CRITICAL findings. See Security tab for details."
          exit 1

  # ── STANDUP SEQUENCE ──────────────────────────────────────────────────────
  # Only runs on workflow_dispatch. Push to main runs plan+apply only.

  trigger-image-build:
    name: Trigger Image Build
    runs-on: ubuntu-latest
    needs: tf-dev-apply
    # Standup sequence is dispatch-only — push to main should not trigger bootstrap
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'dev'
    steps:
      - name: Trigger and poll webapp build-and-push pipeline
        env:
          WEBAPP_TRIGGER_TOKEN: ${{ secrets.WEBAPP_TRIGGER_TOKEN }}
        run: |
          DISPATCH_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          echo "Dispatching at: $DISPATCH_TIME"

          HTTP_STATUS=$(curl -s -X POST \
            -H "Authorization: Bearer $WEBAPP_TRIGGER_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/kalpit10/Capstone-WebApp/actions/workflows/build-and-push.yml/dispatches \
            -d '{"ref":"main","inputs":{"environment":"dev"}}' \
            -w "%{http_code}" -o /dev/null)

          if [ "$HTTP_STATUS" != "204" ]; then
            echo "Failed to trigger webapp pipeline. HTTP status: $HTTP_STATUS"
            exit 1
          fi
          echo "Dispatch accepted (HTTP 204). Waiting for run to appear..."

          sleep 15

          echo "Looking for run created after $DISPATCH_TIME..."
          RUN_ID=""
          JQ_FILTER='.workflow_runs[] | select(.created_at >= $dt) | .id'

          for i in $(seq 1 10); do
            RUN_ID=$(curl -s \
              -H "Authorization: Bearer $WEBAPP_TRIGGER_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/kalpit10/Capstone-WebApp/actions/workflows/build-and-push.yml/runs?branch=main&per_page=5" \
              | jq -r --arg dt "$DISPATCH_TIME" "$JQ_FILTER" \
              | head -1)

            if [ -n "$RUN_ID" ]; then
              echo "Found run ID: $RUN_ID"
              break
            fi
            echo "Run not yet visible, waiting... (attempt $i/10)"
            sleep 10
          done

          if [ -z "$RUN_ID" ]; then
            echo "Could not find the triggered run after 100 seconds. Aborting."
            exit 1
          fi

          TIMEOUT=1800
          INTERVAL=30
          ELAPSED=0

          while [ $ELAPSED -lt $TIMEOUT ]; do
            RUN_DATA=$(curl -s \
              -H "Authorization: Bearer $WEBAPP_TRIGGER_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/kalpit10/Capstone-WebApp/actions/runs/$RUN_ID")

            STATUS=$(echo "$RUN_DATA" | jq -r '.status // empty')
            CONCLUSION=$(echo "$RUN_DATA" | jq -r '.conclusion // empty')

            echo "Status: $STATUS | Conclusion: $CONCLUSION | Elapsed: ${ELAPSED}s"

            if [ "$STATUS" = "completed" ]; then
              if [ "$CONCLUSION" = "success" ]; then
                echo "Webapp pipeline completed successfully."
                exit 0
              else
                echo "Webapp pipeline failed: $CONCLUSION"
                exit 1
              fi
            fi

            sleep $INTERVAL
            ELAPSED=$((ELAPSED + INTERVAL))
          done

          echo "Timed out after ${TIMEOUT}s"
          exit 1

  bootstrap-argocd:
    name: Bootstrap ArgoCD
    runs-on: ubuntu-latest
    needs: trigger-image-build
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'dev'
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        # pin: actions/checkout v4.2.2

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502
        # pin: aws-actions/configure-aws-credentials v4.0.2
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Install kubectl
        run: |
          KUBECTL_VERSION=$(curl -Ls https://dl.k8s.io/release/stable.txt)
          curl -LO "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/amd64/kubectl"
          curl -LO "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/amd64/kubectl.sha256"
          echo "$(cat kubectl.sha256) kubectl" | sha256sum --check
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/kubectl

      - name: Install Helm
        run: |
          curl -LO https://get.helm.sh/helm-v3.17.0-linux-amd64.tar.gz
          curl -LO https://get.helm.sh/helm-v3.17.0-linux-amd64.tar.gz.sha256sum
          sha256sum --check helm-v3.17.0-linux-amd64.tar.gz.sha256sum
          tar -zxvf helm-v3.17.0-linux-amd64.tar.gz
          sudo mv linux-amd64/helm /usr/local/bin/helm

      - name: Configure kubeconfig
        run: aws eks update-kubeconfig --name proshop-eks-dev --region us-east-1

      - name: Create argocd namespace (idempotent)
        run: kubectl create namespace argocd --dry-run=client -o yaml | kubectl apply -f -

      - name: Wait for EKS nodes to be Ready
        run: |
          echo "Waiting for at least one node to be Ready..."
          kubectl wait nodes \
            --for=condition=Ready \
            --all \
            --timeout=600s

      - name: Install ArgoCD via Helm
        run: |
          helm repo add argo https://argoproj.github.io/argo-helm
          helm repo update
          helm upgrade --install argocd argo/argo-cd \
            --namespace argocd \
            --version 7.8.23 \
            --values gitops/argocd/values.yaml \
            --wait \
            --timeout 10m

      - name: Apply root-app
        run: kubectl apply -f argocd/bootstrap/root-app.yaml

  validate-deployment:
    name: Validate Deployment
    runs-on: ubuntu-latest
    needs: bootstrap-argocd
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'dev'
    steps:
      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502
        # pin: aws-actions/configure-aws-credentials v4.0.2
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Install kubectl
        run: |
          KUBECTL_VERSION=$(curl -Ls https://dl.k8s.io/release/stable.txt)
          curl -LO "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/amd64/kubectl"
          curl -LO "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/amd64/kubectl.sha256"
          echo "$(cat kubectl.sha256) kubectl" | sha256sum --check
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/kubectl

      - name: Configure kubeconfig
        run: aws eks update-kubeconfig --name proshop-eks-dev --region us-east-1

      - name: Wait for ArgoCD apps to be Synced and Healthy
        run: |
          TIMEOUT=600
          INTERVAL=20
          ELAPSED=0

          while [ $ELAPSED -lt $TIMEOUT ]; do
            APPS=$(kubectl get applications -n argocd --no-headers 2>/dev/null)

            if [ -z "$APPS" ]; then
              echo "No applications found yet. Waiting..."
              sleep $INTERVAL
              ELAPSED=$((ELAPSED + INTERVAL))
              continue
            fi

            echo "--- ArgoCD Applications ---"
            echo "$APPS"

            NOT_READY=$(echo "$APPS" | awk '{print $2, $3}' | grep -v "Synced Healthy" || true)

            if [ -z "$NOT_READY" ]; then
              echo "All applications are Synced and Healthy."
              break
            fi

            echo "Not ready yet. Waiting..."
            sleep $INTERVAL
            ELAPSED=$((ELAPSED + INTERVAL))
          done

          if [ $ELAPSED -ge $TIMEOUT ]; then
            echo "Timed out. Current state:"
            kubectl get applications -n argocd
            exit 1
          fi

      - name: Output ALB URL to workflow summary
        run: |
          ALB_URL=$(kubectl get ingress -n proshop \
            -o jsonpath='{.items[0].status.loadBalancer.ingress[0].hostname}' 2>/dev/null || echo "")

          echo "## Deployment Complete" >> $GITHUB_STEP_SUMMARY
          if [ -n "$ALB_URL" ]; then
            echo "**URL:** http://${ALB_URL}" >> $GITHUB_STEP_SUMMARY
            echo "ALB URL: http://${ALB_URL}"
          else
            echo "Ingress not yet available. Run: kubectl get ingress -n proshop" >> $GITHUB_STEP_SUMMARY
          fi

  # ── CLOUDWATCH ALARMS ─────────────────────────────────────────────────────
  # Intentionally separated from tf-dev-apply. The cloudwatch module contains
  # a data "aws_lb" tag lookup that requires the ALB to exist at apply time.
  # The ALB is provisioned by the AWS Load Balancer Controller when it processes
  # the Ingress object — that happens during ArgoCD sync, after bootstrap-argocd.
  # validate-deployment confirms all 10 apps are Synced and Healthy before this
  # job runs, guaranteeing the ALB exists and the data source will resolve.

  apply-cloudwatch-alarms:
    name: Apply CloudWatch Alarms
    runs-on: ubuntu-latest
    needs: validate-deployment
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'dev'
    defaults:
      run:
        working-directory: infra/envs/dev
    environment: dev
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        # pin: actions/checkout v4.2.2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd
        # pin: hashicorp/setup-terraform v3.1.2
        with:
          terraform_version: 1.12.2

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502
        # pin: aws-actions/configure-aws-credentials v4.0.2
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Plan (cloudwatch)
        run: |
          terraform plan \
            -input=false \
            -no-color \
            -var-file="dev.tfvars" \
            -target=module.cloudwatch

      - name: Apply CloudWatch module (ALB now exists)
        run: |
          terraform apply \
            -auto-approve \
            -input=false \
            -var-file="dev.tfvars" \
            -target=module.cloudwatch
