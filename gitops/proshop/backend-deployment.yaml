apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: proshop
  labels:
    app: backend
    app.kubernetes.io/part-of: proshop
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
        app.kubernetes.io/part-of: proshop
    spec:
      containers:
        - name: backend
          image: 395136123952.dkr.ecr.us-east-1.amazonaws.com/proshop-backend:latest # prod: same URI, tag managed by CI/CD in Phase 4
          ports:
            - containerPort: 5000
          envFrom:
            - secretRef:
                name: backend-secrets
          resources:
            requests:
              cpu: 100m # prod: 200m (t3.large has more headroom)
              memory: 128Mi # prod: 256Mi
            limits:
              cpu: 500m # prod: 1000m
              memory: 512Mi # prod: 1Gi
          readinessProbe: # readiness means "ready to receive traffic", liveness means "alive and healthy". Separate probes allow for more graceful startup and better failure recovery.
            httpGet:
              path: /api/products
              port: 5000
            initialDelaySeconds: 15 # 15 means "wait 15 seconds before starting to probe". This allows the app to start up without immediately being marked as unhealthy.
            periodSeconds: 10 # 10 here means "probe every 10 seconds". This is a common interval that balances timely detection of issues with avoiding excessive probing.
            failureThreshold: 3 # 3 means "after 3 consecutive failures, mark as unhealthy". This allows for transient issues without immediately marking the app as unhealthy.
          livenessProbe:
            httpGet:
              path: /api/products # This is a simple endpoint that doesn't require authentication, making it ideal for health checks. It verifies that the app can serve requests without the overhead of database connections or other dependencies.
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 3
