# .checkov.yaml

skip-check:
  # CKV_AWS_341: EKS cluster should not use a default VPC
  # We provision a custom VPC — fires as false positive on module reference.
  - CKV_AWS_341

  # CKV_AWS_58: EKS secrets encryption at rest (KMS)
  # Adds cost and complexity beyond capstone scope. Accepted risk.
  - CKV_AWS_58

  # CKV_K8S_14: Image tag is :latest in the manifest at rest.
  # Pipeline replaces this with a SHA tag on every run.
  - CKV_K8S_14

  # CKV_K8S_22: readOnlyRootFilesystem not set.
  # Nginx and Node.js write to runtime paths in third-party images we don't control.
  - CKV_K8S_22

  # CKV_K8S_35: Secrets injected as env vars via envFrom/secretRef.
  # ESO creates the Kubernetes Secret. File-based pattern requires Dockerfile changes we don't own.
  - CKV_K8S_35

  # CKV_K8S_40: runAsUser not set to high UID (>10000).
  # Third-party images — we don't control the UID the app process runs as.
  - CKV_K8S_40

  # CKV_K8S_43: Requires image digest (@sha256:...) not just a tag.
  # SHA tags provide equivalent traceability. Full digest pinning is out of scope.
  - CKV_K8S_43

  # CKV2_K8S_6: No NetworkPolicy defined.
  # EKS default VPC CNI does not enforce NetworkPolicy without additional CNI setup.
  - CKV2_K8S_6

  # CKV_K8S_28: NET_RAW capability not explicitly dropped.
  # Dropping ALL capabilities on Nginx frontend risks breaking port 80 binding.
  - CKV_K8S_28

  # CKV_K8S_37: Capabilities not fully dropped.
  # Same reason — frontend requires NET_BIND_SERVICE to function on port 80.
  - CKV_K8S_37

  # CKV_K8S_6: runAsNonRoot not set.
  # ProShop v2 base images run as root by default — no Dockerfile ownership.
  # Accepted risk documented here.
  - CKV_K8S_6

  # CKV_K8S_30: runAsNonRoot not set at container level.
  # Same reason as above.
  - CKV_K8S_30
