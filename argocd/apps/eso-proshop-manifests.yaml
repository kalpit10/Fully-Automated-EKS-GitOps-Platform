# Separate from eso-manifests (monitoring namespace) because ExternalSecrets
# are namespace-scoped: the Secret produced lands in the same namespace as
# the ExternalSecret itself. Mixing namespace targets in one Application
# requires removing destination.namespace, creating silent misplacement risk.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: eso-proshop-manifests
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/kalpit10/cloud-native-ecommerce-platform.git
    targetRevision: phase1-test # prod: main
    path: gitops/eso/manifests/proshop
  destination:
    server: https://kubernetes.default.svc
    namespace: proshop
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
