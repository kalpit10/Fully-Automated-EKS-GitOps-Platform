# This file defines a PodMonitor for the ArgoCD server, which allows Prometheus to scrape metrics from the ArgoCD server pods.
# The PodMonitor is configured to target pods with the label "app.kubernetes.io/name: argocd-server" in the "argocd" namespace, and it scrapes metrics from the "metrics" port every 30 seconds at the "/metrics" endpoint.

apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: argocd-server
  namespace: argocd
  labels:
    release: kube-prometheus-stack
spec:
  namespaceSelector:
    matchNames:
      - argocd
  selector:
    matchLabels:
      app.kubernetes.io/name: argocd-server
  podMetricsEndpoints:
    - port: metrics
      interval: 30s
      path: /metrics
